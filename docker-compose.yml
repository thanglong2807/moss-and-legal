services:
  app:
    image: ndthaiw/cenvi_launch:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8200}:${APP_PORT:-8200}"
    env_file:
      - .env
    labels:
      - "com.centurylabs.watchtower.scope=autoupdate"

  # Watchtower — tự động pull image mới và restart container
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USERPROFILE}/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_SCOPE=autoupdate
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
    command: --scope autoupdate
