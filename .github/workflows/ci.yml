name: Docker build+push

on:
  push:
    branches:
      - main
    paths:
      - 'requirements.txt'
      - 'Dockerfile'
      - '**.py'
      - 'ui/src/**'
      - 'ui/package*.json'
      - '.env.example'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Lấy version từ .env.example
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep APP_VERSION .env.example | cut -d '=' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 2. Buildx (cần cho multi-stage + cache)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Đăng nhập Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build và Push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ndthaiw/cenvi_launch:${{ steps.get_version.outputs.VERSION }}
            ndthaiw/cenvi_launch:latest
          no-cache: true
